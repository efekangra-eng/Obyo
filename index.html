<!doctype html>
<html lang="tr" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Obyo Trade | İkili Opsiyon Ticareti - Çok Yakında</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FF6B00" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="description" content="Obyo Trade, profesyonel yatırımcılar için tasarlanmış yüksek performanslı ikili opsiyon ticaret platformudur. 15 Temmuz'da yayında." />
    <script>
      (function() {
        try {
          var isLight = localStorage.getItem('obyo_theme_light');
          if (isLight === 'false') {
            document.documentElement.classList.remove('light');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="splash-screen" style="position: fixed; inset: 0; background: #000000; z-index: 999999; transition: opacity 0.6s ease-out; display: flex; align-items: center; justify-content: center;">
      <div style="width: 64px; height: 64px; border-radius: 50%; border: 4px solid #FF6B00; border-top-color: transparent; animation: spin 1s linear infinite;"></div>
    </div>
    <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
